<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Books | Catalog Management</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        /* Form-specific styling matching your elegant admin theme */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
            color: var(--text-secondary, #666666);
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color, #e5e5e5);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent-color, #204035);
        }
        .submit-btn {
            width: 100%;
            border: none;
            cursor: pointer;
            padding: 14px;
            border-radius: 12px;
            background: var(--accent-color, #204035);
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        .cancel-btn {
            display: block;
            text-align: center;
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary, #666666);
            text-decoration: underline;
        }
        .action-icon-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            background: rgba(32, 64, 53, 0.08);
            color: var(--accent-color, #204035);
        }
        .action-icon-btn.delete {
            background: rgba(197, 34, 31, 0.08);
            color: #c5221f;
            margin-left: 5px;
        }
        .alert-success {
            padding: 12px;
            background: rgba(32, 64, 53, 0.1);
            color: var(--accent-color, #204035);
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
<div class="dashboard-wrapper admin-shell">
    <div th:replace="~{admin-sidebar :: sidebar('books')}"></div>

    <main class="main-workspace admin-workspace">
        <header class="top-header admin-header">
            <div class="header-left">
                <h1>Books Catalog</h1>
                <p class="header-subtitle">Catalog management, creation, and inventory control.</p>
            </div>

            <div class="header-center">
                <input type="text" id="searchInput" class="header-search" placeholder="Search books...">
            </div>

            <div class="user-profile">
                <strong th:text="${currentUser?.username != null ? currentUser.username : 'Admin'}">Admin</strong>
                <div class="avatar"></div>
            </div>
        </header>

        <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

        <section class="panel-grid">

            <article class="admin-panel panel-wide">
                <div class="panel-header">
                    <div>
                        <span class="panel-kicker">Inventory</span>
                        <h2>All System Books</h2>
                    </div>
                    <a th:href="@{/admin/books}" class="panel-action">Refresh Registry</a>
                </div>

                <div class="table-shell">
                    <table class="admin-table">
                        <thead>
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Status</th>
                            <th>Rating</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody id="booksTableBody" th:fragment="bookRows">
                        <tr th:each="book : ${allBooks}">
                            <td th:text="${book.title}">Title Mock</td>
                            <td th:text="${book.author}">Author Mock</td>
                            <td>
                        <span class="status-pill"
                            th:classappend="${book.status == 'Available' ? 'available' : 'borrowed'}"
                            th:text="${book.status}">Available</span>
                            </td>
                            <td th:text="${book.avg_rating != null ? book.avg_rating : '0.0'}">4.5</td>
                            <td>
                                <a th:href="@{/admin/books/edit/{id}(id=${book.book_id})}" class="action-icon-btn">Edit</a>
                                <a th:href="@{/admin/books/delete/{id}(id=${book.book_id})}" class="action-icon-btn delete"
                                   onclick="return confirm('Are you sure you want to delete this book?');">Del</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(allBooks)}">
                            <td colspan="5" style="text-align: center; color: var(--text-secondary);">No records found in inventory catalog.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </article>

            <article class="admin-panel">
                <article class="admin-panel">

                    <div class="panel-header" style="border-bottom: 1px dashed var(--border-color, #e5e5e5); padding-bottom: 15px; margin-bottom: 20px;">
                        <div>
                            <span class="panel-kicker">Automation</span>
                            <h2>Google Books Import</h2>
                        </div>
                    </div>

                    <div th:if="${errorMessage}" class="alert-success" style="background: rgba(197, 34, 31, 0.1); color: #c5221f;" th:text="${errorMessage}"></div>

                    <form th:action="@{/admin/books/fetch-and-save}" method="POST" style="margin-bottom: 30px;">
                        <div class="form-group">
                            <label for="apiSearch">Search & Auto-Insert</label>
                            <input type="text" id="apiSearch" name="searchQuery" class="form-control" required placeholder="Type Title, Author, or ISBN..." />
                        </div>
                        <button type="submit" class="submit-btn" style="background-color: #28a745;">Import Book Data</button>
                    </form>

                    <hr style="border: 0; border-top: 1px solid var(--border-color, #e5e5e5); margin: 25px 0;" />

                <form th:action="@{/admin/books/save}" th:object="${bookForm}" method="POST">
                    <input type="hidden" th:field="*{book_id}" />

                    <div class="form-group">
                        <label for="bookTitle">Book Title</label>
                        <input type="text" id="bookTitle" th:field="*{title}" class="form-control" required placeholder="e.g. Clean Architecture" />
                    </div>

                    <div class="form-group">
                        <label for="bookAuthor">Author</label>
                        <input type="text" id="bookAuthor" th:field="*{author}" class="form-control" required placeholder="e.g. Robert C. Martin" />
                    </div>

                    <div class="form-group">
                        <label for="bookStatus">Availability Status</label>
                        <select id="bookStatus" th:field="*{status}" class="form-control">
                            <option value="Available">Available</option>
                            <option value="Borrowed">Borrowed</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="bookRating">Average Rating</label>
                        <input type="number" id="bookRating" step="0.1" min="0" max="5" th:field="*{avg_rating}" class="form-control" placeholder="e.g. 4.8" />
                    </div>

                    <button type="submit" class="submit-btn" th:text="${bookForm.book_id != null} ? 'Update Records' : 'Save Entry'">Save Entry</button>
                    <a th:if="${bookForm.book_id != null}" th:href="@{/admin/books}" class="cancel-btn">Cancel Edit</a>
                </form>
            </article>

        </section>
    </main>
</div>

    <script>
    (function () {
        const searchInput = document.getElementById('searchInput');
        let debounceTimer;

        searchInput.addEventListener('input', function () {
            clearTimeout(debounceTimer);
            const query = this.value;

            debounceTimer = setTimeout(() => {
                fetch('/admin/books/search?query=' + encodeURIComponent(query))
                    .then(response => {
                        if (!response.ok) throw new Error('Search request failed');
                        return response.text();
                    })
                    .then(html => {
                        // re-query each time — the old node is detached after outerHTML swap
                        document.getElementById('booksTableBody').outerHTML = html;
                    })
                    .catch(err => console.error('Live search error:', err));
            }, 300); // 300ms debounce so it doesn't fire on every keystroke
        });
    })();
    </script>
</body>
</html>
