<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Members | Identity Management</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <style>
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; color: var(--text-secondary, #666666); }
        .form-control { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color, #e5e5e5); box-sizing: border-box; font-family: inherit; font-size: 0.95rem; }
        .form-control:focus { outline: none; border-color: var(--accent-color, #204035); }
        .submit-btn { width: 100%; border: none; cursor: pointer; padding: 14px; border-radius: 12px; background: var(--accent-color, #204035); color: #ffffff; font-weight: 700; font-size: 0.95rem; }
        .cancel-btn { display: block; text-align: center; margin-top: 10px; font-size: 0.85rem; color: var(--text-secondary, #666666); text-decoration: underline; }
        .action-icon-btn { padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; background: rgba(32, 64, 53, 0.08); color: var(--accent-color, #204035); }
        .action-icon-btn.delete { background: rgba(197, 34, 31, 0.08); color: #c5221f; margin-left: 5px; }
        .alert-success { padding: 12px; background: rgba(32, 64, 53, 0.1); color: var(--accent-color, #204035); border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; font-weight: 600; }
    </style>
</head>
<body>
<div class="dashboard-wrapper admin-shell">
    <div th:replace="~{admin-sidebar :: sidebar('members')}"></div>

    <main class="main-workspace admin-workspace">
        <header class="top-header admin-header">
            <div class="header-left">
                <h1>Library Members</h1>
                <p class="header-subtitle">Manage user system accesses, authorizations, and credentials.</p>
            </div>
            <div class="header-center">
                <input type="text" class="header-search" placeholder="Search accounts...">
            </div>
            <div class="user-profile">
                <strong>Admin</strong>
                <div class="avatar admin-avatar"></div>
            </div>
        </header>

        <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>

        <section class="panel-grid">
            <article class="admin-panel panel-wide">
                <div class="panel-header">
                    <div>
                        <span class="panel-kicker">Authorization</span>
                        <h2>Registered Members</h2>
                    </div>
                </div>

                <div class="table-shell">
                    <table class="admin-table">
                        <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role Tier</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="member : ${allMembers}">
                            <td th:text="${member.username}">Aisyah Rahman</td>
                            <td>
                                <span class="status-pill"
                                      th:classappend="${member.role == 'LIBRARIAN' ? 'available' : 'borrowed'}"
                                      th:text="${member.role}">STUDENT
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/admin/members/edit/{id}(id=${member.user_id})}" class="action-icon-btn">Edit</a>
                                <a th:href="@{/admin/members/delete/{id}(id=${member.user_id})}" class="action-icon-btn delete"
                                   onclick="return confirm('Revoke member account?');">Del</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(allMembers)}">
                            <td colspan="3" style="text-align: center; color: var(--text-secondary);">No records found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </article>

            <article class="admin-panel">
                <div class="panel-header">
                    <div>
                        <span class="panel-kicker">Identity profile</span>
                        <h2 th:text="${isEditMode == true} ? 'Modify Account Details' : 'Register New Member'">Register New Member</h2>
                    </div>
                </div>

                <form th:action="@{/admin/members/save}" th:object="${memberForm}" method="POST">
                    <input type="hidden" name="isEdit" th:value="${isEditMode == true} ? 'true' : 'false'" />

                    <div class="form-group">
                        <label for="uid">Member User ID (Matric No / ID)</label>
                        <input type="text" id="uid" th:field="*{user_id}" class="form-control"
                               th:readonly="${isEditMode == true}" required placeholder="e.g. B032110045" />
                    </div>

                    <div class="form-group">
                        <label for="memberName">Display Username</label>
                        <input type="text" id="memberName" th:field="*{username}" class="form-control" required placeholder="e.g. daniel_tan" />
                    </div>

                    <div class="form-group" th:if="${isEditMode != true}">
                        <label for="memberPassword">Password Access</label>
                        <input type="password" id="memberPassword" th:field="*{password}" class="form-control"
                               th:required="${isEditMode != true}" placeholder="••••••••" />
                    </div>

                    <div class="form-group">
                        <label for="memberFaculty">Faculty</label>
                        <input type="text" id="memberFaculty" th:field="*{faculty}" class="form-control" placeholder="e.g. FSKTM" />
                    </div>

                    <div class="form-group">
                        <label for="memberRole">System Privilege Role</label>
                        <select id="memberRole" th:field="*{role}" class="form-control">
                            <option value="STUDENT">STUDENT</option>
                            <option value="LIBRARIAN">LIBRARIAN</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn" th:text="${isEditMode == true} ? 'Save Profile Updates' : 'Add Account'">Add Account</button>
                    <a th:if="${isEditMode == true}" th:href="@{/admin/members}" class="cancel-btn">Cancel Edit</a>
                </form>
            </article>
        </section>
    </main>
</div>
</body>
</html>
