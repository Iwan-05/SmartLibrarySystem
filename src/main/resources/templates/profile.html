<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library System - Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: block;">

<script>
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }
</script>

<div class="dashboard-wrapper">

    <aside class="sidebar">
        <div class="brand-logo">THE BOOKS</div>

        <nav class="nav-menu">
            <a th:href="@{/dashboard}" class="nav-link">Discover</a>
            <a th:href="@{/category}" class="nav-link">Category</a>
            <a th:href="@{/mylibrary}" class="nav-link">
                My Library
                <span class="nav-hint">Currently Borrowed</span>
            </a>

            <div class="sidebar-quote-box">
                <p id="dailyQuote">"Loading wisdom..."</p>
                <span id="dailyAuthor">- System</span>
            </div>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">

                <button id="themeToggleBtn" class="sidebar-theme-toggle">
                    <span id="themeIcon">🌙</span> Toggle Theme
                </button>

                <a th:href="@{/profile}" class="nav-link active">Profile</a>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="nav-link" style="width: 100%; text-align: left; background: transparent; border: none; cursor: pointer; font-family: inherit; font-size: inherit; color: inherit;">
                        Log out
                    </button>
                </form>
            </div>
        </nav>
    </aside>

    <main class="main-workspace">

        <header class="top-header">
            <div class="header-left">
                <h1>My Profile</h1>
            </div>

            <div class="header-center"></div>

            <div class="header-right" style="display: flex; align-items: center; justify-content: flex-end;">
                <a th:href="@{/profile}" class="profile-pill" style="margin: 0;">
                    <strong th:text="${currentUser != null ? currentUser.username : 'Abu'}">Abu</strong>
                    <div class="avatar" th:style="'background-image: url(https://api.dicebear.com/7.x/avataaars/svg?seed=' + ${currentUser != null ? currentUser.username : 'Abu'} + ')'"></div>
                </a>
            </div>
        </header>

        <div class="profile-container">

            <div class="profile-header-card">

                <div class="avatar-large" th:style="'background-image: url(https://api.dicebear.com/7.x/avataaars/svg?seed=' + ${currentUser != null ? currentUser.username : 'Abu'} + ')'"></div>

                <div class="profile-details">
                    <h2 th:text="${currentUser != null ? currentUser.username : 'Davis Workman'}">Davis Workman</h2>
                    <p th:text="${currentUser != null ? currentUser.faculty : 'Faculty of Computer Science and Information Technology'}">Faculty of Computer Science and Information Technology</p>
                    <span class="role-badge" th:text="${currentUser != null ? currentUser.role : 'Student'}">Student</span>
                </div>
            </div>

            <div class="stats-grid">

                <div class="stat-card">
                    <h4>Active Loans</h4>
                    <div class="stat-value" th:text="${activeLoanCount}">3</div>
                </div>

                <div class="stat-card">
                    <h4>Books Read</h4>
                    <div class="stat-value" th:text="${pastLoanCount}">3</div>
                </div>

                <div class="stat-card">
                    <h4>Outstanding Fines</h4>
                    <div class="stat-value penalty" th:text="${currentUser != null ? 'RM ' + currentUser.fine : 'RM 0.00'}">RM 4.00</div>
                </div>

            </div>
        </div>

    </main>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const quotes = [
            { text: "A room without books is like a body without a soul.", author: "Marcus Tullius Cicero" },
            { text: "So many books, so little time.", author: "Frank Zappa" },
            { text: "There is no friend as loyal as a book.", author: "Ernest Hemingway" },
            { text: "Books are a uniquely portable magic.", author: "Stephen King" },
            { text: "That is part of the beauty of all literature. You discover that your longings are universal longings.", author: "F. Scott Fitzgerald" },
            { text: "Reading is essential for those who seek to rise above the ordinary.", author: "Jim Rohn" },
            { text: "I have always imagined that Paradise will be a kind of library.", author: "Jorge Luis Borges" },
            { text: "A reader lives a thousand lives before he dies. The man who never reads lives only one.", author: "George R.R. Martin" }
        ];

        // Pick a random number between 0 and the length of the array
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

        // Inject the text into the HTML
        const quoteElement = document.getElementById('dailyQuote');
        const authorElement = document.getElementById('dailyAuthor');

        if (quoteElement && authorElement) {
            quoteElement.innerText = '"' + randomQuote.text + '"';
            authorElement.innerText = "- " + randomQuote.author;
        }
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const themeBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        if (body.classList.contains('dark-mode')) {
            if(themeIcon) themeIcon.innerText = '☀️';
        }

        if(themeBtn) {
            themeBtn.addEventListener('click', function() {
                body.classList.toggle('dark-mode');

                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    themeIcon.innerText = '☀️';
                } else {
                    localStorage.setItem('theme', 'light');
                    themeIcon.innerText = '🌙';
                }
            });
        }
    });
</script>

</body>
</html>
