<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library System - Categories</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .action-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        /* The Custom Dropdown Styling */
        .custom-select-wrapper {
            position: relative;
        }
        .premium-select {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(200, 190, 180, 0.6);
            border-radius: 30px;
            padding: 9px 40px 9px 20px;
            color: #444;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }
        .premium-select:hover, .premium-select:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #222;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .select-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #666;
            font-size: 0.8rem;
        }

        /* The Action Bar Search Input */
        .premium-search {
            margin-left: auto; /* Pushes the search bar to the far right */
            width: 300px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(200, 190, 180, 0.6);
            border-radius: 30px;
            padding: 9px 20px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }
        .premium-search:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #222;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body style="display: block;">

<div class="dashboard-wrapper">

    <aside class="sidebar">
        <div class="brand-logo">THE BOOKS</div>

        <nav class="nav-menu">
            <a th:href="@{/dashboard}" class="nav-link">Discover</a>
            <a th:href="@{/category}" class="nav-link active">Category</a>
            <a th:href="@{/mylibrary}" class="nav-link">
                My Library
                <span class="nav-hint">Currently Borrowed</span>
            </a>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
                <a th:href="@{/profile}" class="nav-link">Profile</a>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="nav-link" style="width: 100%; text-align: left; background: transparent; border: none; cursor: pointer; font-family: inherit; font-size: inherit; color: inherit;">
                        Log out
                    </button>
                </form>
            </div>
        </nav>
    </aside>

    <main class="main-workspace">

        <header class="top-header">
            <div class="header-left">
                <h1>Categories</h1>
            </div>

            <div class="header-center"></div>

            <div class="user-profile">
                <strong th:text="${currentUser != null ? currentUser.username : 'Davis Workman'}">Davis Workman</strong>
                <div class="avatar"></div>
            </div>
        </header>

        <div class="action-bar">

            <button id="allBooksBtn" class="filter-pill active" onclick="resetToAllBooks()">All Books</button>

            <div class="custom-select-wrapper">
                <select id="genreSelect" class="premium-select" onchange="selectGenre()">
                    <option value="" disabled selected>Select a Category...</option>
                    <optgroup label="Tech & Science">
                        <option value="Computers">Computer Science</option>
                        <option value="Technology & Engineering">Tech & Engineering</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="Medical">Medical</option>
                    </optgroup>
                    <optgroup label="Fiction & Literature">
                        <option value="Fiction">Fiction</option>
                        <option value="Science Fiction">Science Fiction</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Mystery & Thrillers">Mystery & Thriller</option>
                        <option value="Horror">Horror</option>
                        <option value="Romance">Romance</option>
                        <option value="Comics & Graphic Novels">Graphic Novels</option>
                    </optgroup>
                    <optgroup label="Non-Fiction & Life">
                        <option value="Non-Fiction">Non-Fiction</option>
                        <option value="Business & Economics">Business & Finance</option>
                        <option value="Biography & Autobiography">Biography</option>
                        <option value="History">History</option>
                        <option value="Law">Law</option>
                        <option value="Philosophy">Philosophy</option>
                        <option value="Psychology">Psychology</option>
                        <option value="Art">Art & Design</option>
                        <option value="Cooking">Cooking</option>
                        <option value="Travel">Travel</option>
                        <option value="Sports & Recreation">Sports</option>
                    </optgroup>
                </select>
                <span class="select-icon">▼</span>
            </div>

            <input type="text"
                   id="categorySearch"
                   class="premium-search"
                   placeholder="Search within categories..."
                   onkeyup="handleSearch()">
        </div>

        <section>
            <div class="book-shelf" id="bookShelf">
                <div class="book-card" th:each="book : ${books}"
                     style="cursor: pointer;"
                     th:data-id="${book.book_id}"
                     th:data-title="${book.title}"
                     th:data-author="${book.author}"
                     th:data-rating="${book.avg_rating}"
                     th:data-cover="${book.cover_url}"
                     onclick="openBookDetails(this.getAttribute('data-id'), this.getAttribute('data-title'), this.getAttribute('data-author'), '', this.getAttribute('data-rating'), this.getAttribute('data-cover'))">

                    <img th:src="${book.cover_url != null ? book.cover_url : '/images/default-cover.png'}" alt="Book Cover" class="book-cover">

                    <div class="book-info">
                        <h3 class="book-title" th:text="${book.title}">Book Title Placeholder</h3>
                        <p class="book-author" th:text="${book.author}">Author Name</p>

                        <div class="book-meta">
                            <span class="rating-badge" th:text="'★ ' + ${book.avg_rating != null ? book.avg_rating : '0.0'}">★ 0.0</span>
                            <span class="status-tag"
                                  th:classappend="${book.status != null && book.status == 'Available' ? 'available' : 'borrowed'}"
                                  th:text="${book.status != null ? book.status : 'Unknown'}">
                                Status
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script>
            let currentGenre = 'All Books';

            function resetToAllBooks() {
                document.getElementById('allBooksBtn').classList.add('active');
                document.getElementById('genreSelect').value = ""; // Resets the dropdown
                currentGenre = 'All Books';
                fetchFilteredBooks();
            }

            function selectGenre() {
                document.getElementById('allBooksBtn').classList.remove('active');
                const select = document.getElementById('genreSelect');
                currentGenre = select.options[select.selectedIndex].value;
                fetchFilteredBooks();
            }

            function handleSearch() {
                fetchFilteredBooks();
            }

            function fetchFilteredBooks() {
                const searchInput = document.getElementById('categorySearch').value;
                const url = `/category/filter?genre=${encodeURIComponent(currentGenre)}&search=${encodeURIComponent(searchInput)}`;

                fetch(url)
                    .then(res => res.json())
                    .then(books => {
                        const shelf = document.getElementById('bookShelf');
                        shelf.innerHTML = '';

                        if (books.length === 0) {
                            shelf.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px; font-size: 1.1rem; background: rgba(255,255,255,0.5); border-radius: 15px;">No books found matching criteria.</p>';
                            return;
                        }

                        books.forEach(book => {
                            const title = book.title || book.TITLE || 'Untitled';
                            const author = book.author || book.AUTHOR || 'Unknown Author';
                            const coverUrl = book.cover_url || book.COVER_URL || '/images/default-cover.png';
                            const status = book.status || book.STATUS || 'Unknown';
                            const statusClass = status.toLowerCase() === 'available' ? 'available' : 'borrowed';
                            const synopsis = book.synopsis || book.SYNOPSIS || '';
                            const bookId = book.book_id || book.BOOK_ID || book.id || null;

                            let rating = '0.0';
                            if (book.avg_rating !== undefined && book.avg_rating !== null) rating = book.avg_rating;
                            else if (book.AVG_RATING !== undefined && book.AVG_RATING !== null) rating = book.AVG_RATING;

                            const safeTitle = title.replace(/'/g, "\\'");
                            const safeAuthor = author.replace(/'/g, "\\'");
                            const safeSynopsis = synopsis.replace(/'/g, "\\'");

                            shelf.innerHTML += `
                                <div class="book-card" style="cursor: pointer;" onclick="openBookDetails(${bookId}, '${safeTitle}', '${safeAuthor}', '${safeSynopsis}', '${rating}', '${coverUrl}')">
                                    <img src="${coverUrl}" alt="Book Cover" class="book-cover">
                                    <div class="book-info">
                                        <h3 class="book-title">${title}</h3>
                                        <p class="book-author">${author}</p>
                                        <div class="book-meta">
                                            <span class="rating-badge">★ ${rating}</span>
                                            <span class="status-tag ${statusClass}">${status}</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    })
                    .catch(err => console.error("Error updating category bookshelf:", err));
            }
        </script>

    </main>
</div>

<div class="modal-overlay" id="bookDetailsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center;">

    <div class="glass-card" style="background: rgba(255, 255, 255, 0.98); max-width: 600px; display: flex; gap: 30px; text-align: left; position: relative; padding: 40px; border-radius: 20px;">

        <button onclick="closeDetailsModal()" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.5rem; color: #666; cursor: pointer; padding: 5px;">&times;</button>

        <div style="flex-shrink: 0; width: 180px;">
            <div id="detailCover" style="width: 100%; height: 260px; background: #e8decc; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden;">
                <img id="detailCoverImg" src="" alt="Book Cover" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            </div>
        </div>

        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
            <h2 id="detailTitle" style="margin: 0 0 5px 0; color: var(--text-primary, #222); font-size: 1.6rem;">Book Title</h2>
            <p id="detailAuthor" style="margin: 0 0 10px 0; color: var(--text-secondary, #666); font-size: 1rem; font-style: italic;">By Author Name</p>

            <div style="color: #FFD700; font-size: 1.2rem; margin-bottom: 15px;">
                ★★★★☆ <span id="detailRating" style="color: #999; font-size: 0.8rem; margin-left: 5px;">(0.0)</span>
            </div>

            <p id="detailSynopsis" style="color: #555; font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px; max-height: 100px; overflow-y: auto; padding-right: 10px;">
                Synopsis loading...
            </p>

            <form th:action="@{/borrowBook}" method="post">
                <input type="hidden" name="bookId" id="detailBookId">
                <button type="submit" class="btn-get-started" style="width: 100%;">Borrow this Book</button>
            </form>
        </div>
    </div>
</div>

<script>
    function openBookDetails(id, title, author, synopsis, rating, coverUrl) {
        document.getElementById('detailBookId').value = id;
        document.getElementById('detailTitle').innerText = title;
        document.getElementById('detailAuthor').innerText = "By " + author;

        document.getElementById('detailSynopsis').innerText = synopsis ? synopsis : "No synopsis available for this title.";
        document.getElementById('detailRating').innerText = "(" + (rating ? rating : '0.0') + ")";

        const coverImg = document.getElementById('detailCoverImg');
        if(coverUrl && coverUrl !== 'null' && coverUrl !== '') {
            coverImg.src = coverUrl;
            coverImg.style.display = 'block';
        } else {
            coverImg.style.display = 'none';
        }

        document.getElementById('bookDetailsModal').style.display = 'flex';
    }

    function closeDetailsModal() {
        document.getElementById('bookDetailsModal').style.display = 'none';
    }

    // Click outside to close
    window.onclick = function(event) {
        const modal = document.getElementById('bookDetailsModal');
        if (event.target === modal) {
            closeDetailsModal();
        }
    }
</script>

</body>
</html>
