<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library System - Categories</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: block;">

<div class="dashboard-wrapper">

    <aside class="sidebar">
        <div class="brand-logo">THE BOOKS</div>

        <nav class="nav-menu">
            <a th:href="@{/dashboard}" class="nav-link">Discover</a>
            <a th:href="@{/category}" class="nav-link active">Category</a>
            <a th:href="@{/mylibrary}" class="nav-link">
                My Library
                <span class="nav-hint">Currently Borrowed</span>
            </a>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
                <a th:href="@{/profile}" class="nav-link">Profile</a>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="nav-link" style="width: 100%; text-align: left; background: transparent; border: none; cursor: pointer; font-family: inherit; font-size: inherit; color: inherit;">
                        Log out
                    </button>
                </form>
            </div>
        </nav>
    </aside>

    <main class="main-workspace">

        <header class="top-header">
            <div class="header-left">
                <h1>Categories</h1>
            </div>

            <div class="header-center">
                <input type="text"
                       id="categorySearch"
                       class="header-search"
                       placeholder="Search within categories..."
                       onkeyup="handleSearch()">
            </div>

            <div class="user-profile">
                <strong th:text="${currentUser != null ? currentUser.username : 'Davis Workman'}">Davis Workman</strong>
                <div class="avatar"></div>
            </div>
        </header>

        <div class="category-filters">
            <button class="filter-pill active" onclick="filterBooks('All Books', this)">All Books</button>
            <button class="filter-pill" onclick="filterBooks('Business & Finance', this)">Business & Finance</button>
            <button class="filter-pill" onclick="filterBooks('Design & UI/UX', this)">Design & UI/UX</button>
            <button class="filter-pill" onclick="filterBooks('Computer Science', this)">Computer Science</button>
            <button class="filter-pill" onclick="filterBooks('Fiction', this)">Fiction</button>
            <button class="filter-pill" onclick="filterBooks('Horror', this)">Horror</button>
        </div>

        <section>
            <div class="book-shelf" id="bookShelf">
                <div class="book-card" th:each="book : ${books}">
                    <img th:src="${book.cover_url != null ? book.cover_url : '/images/default-cover.png'}" alt="Book Cover" class="book-cover">

                    <div class="book-info">
                        <h3 class="book-title" th:text="${book.title}">Book Title Placeholder</h3>
                        <p class="book-author" th:text="${book.author}">Author Name</p>

                        <div class="book-meta">
                            <span class="rating-badge" th:text="'★ ' + ${book.avg_rating != null ? book.avg_rating : '0.0'}">★ 0.0</span>
                            <span class="status-tag"
                                  th:classappend="${book.status != null && book.status == 'Available' ? 'available' : 'borrowed'}"
                                  th:text="${book.status != null ? book.status : 'Unknown'}">
                                Status
                            </span>
                        </div>

                        <form th:action="@{/borrowBook}" method="post" style="margin-top: 15px;">
                            <input type="hidden" name="bookId" th:value="${book.book_id}" />
                            <button type="submit" class="btn-primary"
                                    th:if="${book.status != null && book.status == 'Available'}"
                                    style="padding: 10px; font-size: 0.9rem;">
                                Borrow Book
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </section>

        <script>
            let currentGenre = 'All Books';

            function filterBooks(genre, btn) {
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');

                currentGenre = genre;
                fetchFilteredBooks();
            }

            function handleSearch() {
                fetchFilteredBooks();
            }

            function fetchFilteredBooks() {
                const searchInput = document.getElementById('categorySearch').value;
                const url = `/category/filter?genre=${encodeURIComponent(currentGenre)}&search=${encodeURIComponent(searchInput)}`;

                fetch(url)
                    .then(res => res.json())
                    .then(books => {
                        const shelf = document.getElementById('bookShelf');
                        shelf.innerHTML = '';

                        if (books.length === 0) {
                            shelf.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888; padding: 20px;">No books found matching criteria.</p>';
                            return;
                        }

                        books.forEach(book => {
                            const coverUrl = book.cover_url ? book.cover_url : '/images/default-cover.png';
                            const rating = book.avg_rating ? book.avg_rating : '0.0';
                            const status = book.status ? book.status : 'Unknown';
                            const statusClass = status === 'Available' ? 'available' : 'borrowed';

                            // DYNAMIC JS LOAD: Build the Borrow Button HTML only if available
                            let borrowButtonHtml = '';
                            if (status === 'Available') {
                                borrowButtonHtml = `
                                    <form action="/borrowBook" method="post" style="margin-top: 15px;">
                                        <input type="hidden" name="bookId" value="${book.book_id}" />
                                        <button type="submit" class="btn-primary" style="padding: 10px; font-size: 0.9rem;">
                                            Borrow Book
                                        </button>
                                    </form>
                                `;
                            }

                            // Inject the card along with the conditional borrow button
                            shelf.innerHTML += `
                                <div class="book-card">
                                    <img src="${coverUrl}" alt="Book Cover" class="book-cover">
                                    <div class="book-info">
                                        <h3 class="book-title">${book.title}</h3>
                                        <p class="book-author">${book.author}</p>
                                        <div class="book-meta">
                                            <span class="rating-badge">★ ${rating}</span>
                                            <span class="status-tag ${statusClass}">${status}</span>
                                        </div>
                                        ${borrowButtonHtml}
                                    </div>
                                </div>
                            `;
                        });
                    })
                    .catch(err => console.error("Error updating category bookshelf:", err));
            }
        </script>

    </main>
</div>

</body>
</html>
