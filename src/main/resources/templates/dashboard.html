<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library System - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: block;"> <div class="dashboard-wrapper">

    <aside class="sidebar">
        <div class="brand-logo">THE BOOKS</div>

        <nav class="nav-menu">
            <a href="#" class="nav-link active">Discover</a>
            <a href="#" class="nav-link">Category</a>
            <a href="#" class="nav-link">
                My Library
                <span class="nav-hint">Currently Borrowed</span>
            </a>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
                <a href="#" class="nav-link">Profile</a>
                <a th:href="@{/login}" class="nav-link">Log out</a>
            </div>
        </nav>
    </aside>

    <main class="main-workspace">

        <header class="top-header">
            <div class="header-left">
                <h1>Discover</h1>
            </div>

            <div class="header-center">
                <input type="text" class="header-search" placeholder="Find the book you like...">
            </div>

            <div class="user-profile">
                <strong>Davis Workman</strong>
                <div class="avatar"></div>
            </div>
        </header>

        <section>
            <h2 class="section-title">Book Recommendation</h2>

            <div class="book-shelf">
                <div class="book-card">
                    <div class="book-cover"></div>
                </div>
                <div class="book-card">
                    <div class="book-cover"></div>
                </div>
                <div class="book-card">
                    <div class="book-cover"></div>
                </div>
                <div class="book-card">
                    <div class="book-cover"></div>
                </div>
            </div>
        </section>

    </main>
</div>

</body>
</html>
