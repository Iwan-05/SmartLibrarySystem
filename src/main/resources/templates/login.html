<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-card">
    <h2>System Access</h2>

    <form th:action="@{/login}" method="POST">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="role-toggle">
            <div class="radio-wrapper">
                <input type="radio" id="roleStudent" name="role" value="STUDENT" checked>
                <label for="roleStudent">Student</label>
            </div>
            <div class="radio-wrapper">
                <input type="radio" id="roleLibrarian" name="role" value="LIBRARIAN">
                <label for="roleLibrarian">Librarian</label>
            </div>
        </div>

        <button type="submit" class="btn-primary">Authenticate</button>
    </form>
</div>

</body>
</html>
