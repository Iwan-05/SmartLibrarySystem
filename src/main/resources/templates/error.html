<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Library System - Page Not Found</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: var(--bg-main);">

<div class="login-card" style="text-align: center; padding: 50px;">

    <div style="font-size: 5rem; margin-bottom: 10px;">📚</div>

    <h1 style="color: var(--accent-color); font-size: 3rem; margin: 0 0 10px 0;">404</h1>
    <h2 style="color: var(--text-primary); margin-top: 0;">Oops! Page Not Found</h2>

    <p style="color: var(--text-secondary); margin-bottom: 40px; line-height: 1.6;">
        It looks like this page is lost in the archives. <br>
        We couldn't find the resource you were looking for.
    </p>

    <a th:href="@{/}" style="text-decoration: none;">
        <button class="btn-primary" style="width: auto; padding: 12px 30px;">Return Home</button>
    </a>

</div>

</body>
</html>
